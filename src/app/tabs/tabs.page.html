<ion-tabs (ionTabsDidChange)="setCurrentTab($event)">
  <ion-tab-bar slot="bottom">
    
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon [name]="selectedTab === 'tab1' ? 'home-sharp' : 'home-outline'"></ion-icon>
      <ion-label>{{ userRole === 'admin' ? 'Home' : 'My Room' }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon [name]="selectedTab === 'tab2' ? 'cash-sharp' : 'cash-outline'" *ngIf="userRole === 'tenant'"></ion-icon>
      <ion-icon [name]="selectedTab === 'tab2' ? 'bed-sharp' : 'bed-outline'" *ngIf="userRole === 'admin'"></ion-icon>
      <ion-label>{{ userRole === 'admin' ? 'Rooms' : 'Rent' }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon [name]="selectedTab === 'tab3' ? 'construct-sharp' : 'construct-outline'" *ngIf="userRole === 'tenant'"></ion-icon>
      <ion-icon [name]="selectedTab === 'tab3' ? 'people-sharp' : 'people-outline'" *ngIf="userRole === 'admin'"></ion-icon>
      <ion-label>{{ userRole === 'admin' ? 'Tenants' : 'Support' }}</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
